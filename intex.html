<!DOCTYPE html>
<!--Define que o dovumento está usando HTML5-->
<html lang="pt-BR">
    <!--tag raiz do documento lang define o idioma da pagina-->
<head>
    <!--Cabeçalho da pagina invisivel para o usuario -->
    <meta charset="UTF-8">
    <!--define a codificação do caracteries (acentos funcionando corretamente)-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--faz a pagina se adaptar a celulares e tablets -->
    <title>Meu blog</title>
    <!--titulo que aparece na aba do navegador-->
</head>
<body>
    <!--corpo da pagina(tudo que aparece para o usuário)-->
    <header>
        <!--Cabeçalho visivel da pagina-->
        <img src="ramon-dino.webp" alt="mw-1920 "  height="100%" width="200px">
        <!--img exibe uma imagem-->
        <!--src = caminha da imagem--->
        <!--alt = texto de referência imagem-->
        <!--width = largura da imagem-->
        <!--height = altura da imagem-->
        <nav>
           <!-- area de navegação-->
            <a href="http://">filmes</a>
            <a href="http://">desenhos</a>
            <a href="http://youtube.com"
            target="_blank">youtube</a>
            <!--tag <a> cria um link-->
            <!--bref = destino do site (pagina)-->
            <!--target="_blank" abre em uma nova aba-->
        </nav>
    </header>
    <main>
        <!--conteúdo principal da pagina-->
     <h1> RAMON DINO GANHA MISTER OLIMPIA</h1>
    <!--titúlo principal da pagina-->
    </main>
    <footer>
        <!--rodape da pagina informações gerais-->
     rodapé
    </footer>
</body>
</html>\
